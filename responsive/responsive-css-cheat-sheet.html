  <title>Responsive CSS Cheat Sheet</title>
  <link rel="stylesheet" href="responsive-css-cheat-sheet.css">
</head>
<body>
  <main class="grid">
    <div class="box"><h3>Filters</h3><p>Use CSS filters like grayscale(), blur(), and contrast() for effects.</p></div>
