<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form Security</title>
</head>
<body>
<form autocomplete="off">
  Username: <input type="text" required><br>
  Password: <input type="password" required><br>
  <button type="submit">Submit</button>
</form>
<p>Turning off autocomplete prevents the browser from storing sensitive information, improving security.</p>
</body>
</html>
