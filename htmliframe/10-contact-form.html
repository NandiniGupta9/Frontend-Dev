<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Form</title>
</head>
<body>
<form>
  Full Name: <input type="text" placeholder="Your Name" required><br>
  Email: <input type="email" placeholder="Your Email" required><br>
  Subject: <input type="text" placeholder="Subject" required><br>
  Message:<br>
  <textarea placeholder="Type your message here..." required></textarea><br>
  <button type="submit">Send</button>
</form>
</body>
</html>
