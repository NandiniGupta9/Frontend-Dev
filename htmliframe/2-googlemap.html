<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google Map Embed</title>
</head>
<body>
<h1>Google Map</h1>
<!-- loading="lazy" delays loading the iframe until it is visible -->
<iframe src="https://www.google.com/maps?q=New+York&output=embed" width="600" height="450" title="Google Map" loading="lazy"></iframe>
</body>
</html>
