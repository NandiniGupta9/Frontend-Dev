<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dropdown Selection</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
  <h1>Choose Your Location</h1>

  <form>
    <label for="country">Country:</label><br>
    <select id="country" name="country">
      <option value="india" selected>India</option>
      <option value="usa">United States</option>
      <option value="france">France</option>
    </select>
    <br><br>

    <label for="state">State:</label><br>
    <select id="state" name="state">
      <option value="ka" selected>Karnataka</option>
      <option value="mh">Maharashtra</option>
      <option value="dl">Delhi</option>
    </select>
    <br><br>

    <label for="city">City:</label><br>
    <select id="city" name="city">
      <option value="blr" selected>Bengaluru</option>
      <option value="mum">Mumbai</option>
      <option value="del">New Delhi</option>
    </select>
    <br><br>

    <label for="place">Favorite Tourist Place:</label><br>
    <select id="place" name="place">
      <option value="palace">Mysore Palace</option>
      <option value="lake" selected>Lalbagh Botanical Garden</option>
      <option value="fort">Bangalore Fort</option>
    </select>
  </form>

  <p>Selected: Country — India; State — Karnataka; City — Bengaluru; Favorite Place — Lalbagh Botanical Garden.</p>
</body>
</html>
