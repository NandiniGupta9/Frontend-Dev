<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Course Registration</title>
</head>
<body>
  <h1>Course Registration Form</h1>

  <form>
    <fieldset>
      <legend>Student Details</legend>
      Name: <input type="text" name="name"><br><br>
      Email: <input type="email" name="email"><br><br>
      Select Course:
      <select name="course">
        <option value="html">HTML Basics</option>
        <option value="css">CSS Fundamentals</option>
        <option value="js">JavaScript</option>
      </select>
    </fieldset>

    <h2>Available Schedules</h2>
    <table border="1">
      <tr><th>Day</th><th>Time</th><th>Instructor</th></tr>
      <tr><td>Monday</td><td>10 AM</td><td>Mr. Smith</td></tr>
      <tr><td>Wednesday</td><td>2 PM</td><td>Ms. Johnson</td></tr>
    </table>
  </form>
</body>
</html>
