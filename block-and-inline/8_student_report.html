<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Student Report</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    table { border-collapse:collapse; width:60%; }
    th, td { border:1px solid #aaa; padding:8px; text-align:center; }
    caption { font-weight:bold; margin-bottom:6px; }
  </style>
</head>
<body>
  <h1 title="Name of the School">Springfield High School</h1>

  <table title="Marks table for student">
    <caption>Student Marks - Semester 1</caption>
    <thead>
      <tr>
        <th>Subject</th>
        <th>Marks (Out of 100)</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>Mathematics</td><td>85</td></tr>
      <tr><td>Science</td><td>78</td></tr>
      <tr><td>English</td><td>82</td></tr>
      <tr><td>History</td><td>74</td></tr>
      <tr><td>Computer Science</td><td>90</td></tr>
      <tr>
        <td colspan="1" rowspan="1"><strong>Total</strong></td>
        <td><strong>409</strong></td>
      </tr>
      <tr>
        <td colspan="1"><strong>Percentage</strong></td>
        <td><strong>81.8%</strong></td>
      </tr>
    </tbody>
  </table>
</body>
</html>
