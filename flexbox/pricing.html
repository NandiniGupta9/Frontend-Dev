<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Plans</title>
  <link rel="stylesheet" href="pricing.css">
</head>
<body>
  <section class="pricing">
    <div class="card">
      <h2>Basic</h2>
      <p>$9/month</p>
      <ul>
        <li>1 GB Storage</li>
        <li>Email Support</li>
        <li>Basic Features</li>
      </ul>
      <a href="#">Choose</a>
    </div>
    <div class="card highlight">
      <h2>Standard</h2>
      <p>$19/month</p>
      <ul>
        <li>10 GB Storage</li>
        <li>Chat Support</li>
        <li>Advanced Features</li>
      </ul>
      <a href="#">Choose</a>
    </div>
    <div class="card">
      <h2>Premium</h2>
      <p>$29/month</p>
      <ul>
        <li>50 GB Storage</li>
        <li>24/7 Support</li>
        <li>All Features</li>
      </ul>
      <a href="#">Choose</a>
    </div>
  </section>
</body>
</html>
