<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>
  <link rel="stylesheet" href="photo-gallery.css">
</head>
<body>
  <section class="gallery">
    <figure>
      <img src="https://source.unsplash.com/random/400x400?nature" alt="Nature Image">
      <figcaption>Nature</figcaption>
    </figure>
    <figure>
      <img src="https://source.unsplash.com/random/400x400?city" alt="City Image">
      <figcaption>City</figcaption>
    </figure>
    <figure>
      <img src="https://source.unsplash.com/random/400x400?food" alt="Food Image">
      <figcaption>Food</figcaption>
    </figure>
    <figure>
      <img src="https://source.unsplash.com/random/400x400?travel" alt="Travel Image">
      <figcaption>Travel</figcaption>
    </figure>
    <figure>
      <img src="https://source.unsplash.com/random/400x400?animals" alt="Animal Image">
      <figcaption>Animals</figcaption>
    </figure>
    <figure>
      <img src="https://source.unsplash.com/random/400x400?technology" alt="Technology Image">
      <figcaption>Technology</figcaption>
    </figure>
  </section>
</body>
</html>
