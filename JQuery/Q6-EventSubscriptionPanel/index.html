<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q6 - Event Subscription Panel</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>.topic{margin:5px;padding:5px;border:1px solid #ccc;}</style>
</head>
<body>
<header><h1>Subscription Panel</h1></header>
<main>
  <button id="subscribe">Subscribe</button>
  <button id="unsubscribe">Unsubscribe</button>
  <div id="topics">
    <div class="topic">Topic 1</div>
    <div class="topic">Topic 2</div>
    <div class="topic">Topic 3</div>
  </div>
  <button id="addTopic">Add Topic</button>
  <button id="removeTopic">Remove Topic</button>
</main>
<script src="script.js"></script>
</body>
</html>
