<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q2 - Product Highlight</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
.selected {border:2px solid red;}
.discount {background-color: #ffeb3b;}
</style>
</head>
<body>
<header><h1>Product Highlight</h1></header>
<main>
  <div class="product" data-stock="in" data-discount="yes">Product 1</div>
  <div class="product" data-stock="out" data-discount="no">Product 2</div>
  <div class="product" data-stock="in" data-discount="yes">Product 3</div>
  <div class="product" data-stock="in" data-discount="no">Product 4</div>
  <div class="product" data-stock="out" data-discount="yes">Product 5</div>
  <span class="favorite">❤️</span>
</main>
<script src="script.js"></script>
</body>
</html>
