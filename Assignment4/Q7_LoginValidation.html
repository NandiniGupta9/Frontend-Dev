<!DOCTYPE html>
<html>
<body>

<form id="loginForm">
  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button type="submit">Login</button>
</form>

<div id="msg"></div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  let userReg = /^.{5,}$/;
  let passReg = /^(?=.*[A-Z])(?=.*\d)(?=.*[a-z])(?=.*[@#$%^&*!]).{8,}$/;

  if (!userReg.test(user)) return alert("Username must be at least 5 characters");
  if (!passReg.test(pass)) return alert("Password must be strong");

  document.getElementById("msg").innerHTML = "Login Successful!";
});
</script>
</body>
</html>
