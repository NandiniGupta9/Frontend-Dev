<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>UI Components</title>
  <link rel="stylesheet" href="q7.css">
</head>
<body>
  <main class="card">
    <h1>Search UI</h1>
    <form class="controls" action="#" method="get" novalidate>
      <input type="search" placeholder="Search..." aria-label="Search">
      <select>
        <option>All</option>
        <option>Users</option>
        <option>Files</option>
      </select>
      <button class="btn">Search</button>
    </form>
  </main>
</body>
</html>
