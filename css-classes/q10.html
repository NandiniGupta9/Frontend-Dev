<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mini UI Layout</title>
  <link rel="stylesheet" href="q10.css">
</head>
<body>
  <header class="site-header"><h1>Mini App</h1></header>
  <main class="center">
    <section class="card">
      <form class="form">
        <label>
          Name
          <input type="text" placeholder="Your name">
        </label>
        <label>
          Email
          <input type="email" placeholder="you@example.com">
        </label>
        <div class="row">
          <button class="btn primary">Submit</button>
          <button class="btn outline" type="button">Cancel</button>
        </div>
      </form>
      <figure class="avatar">
        <img src="https://via.placeholder.com/120" alt="small image">
        <figcaption>Profile image</figcaption>
      </figure>
    </section>
  </main>
  <footer class="site-footer">© Mini UI — Footer</footer>
</body>
</html>
