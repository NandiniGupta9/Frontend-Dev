<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CSS Tooltips</title>
  <link rel="stylesheet" href="q2.css">
</head>
<body>
  <main class="center">
    <h1>CSS-only Tooltips</h1>
    <div class="icons">
      <div class="tip" tabindex="0">
        <span class="marker">🔍</span>
        <span class="tooltip">Search the site</span>
      </div>

      <div class="tip" tabindex="0">
        <span class="marker">❓</span>
        <span class="tooltip">Help &amp; FAQ</span>
      </div>

      <div class="tip" tabindex="0">
        <span class="marker">📂</span>
        <span class="tooltip">Open documents</span>
      </div>
    </div>
  </main>
</body>
</html>
