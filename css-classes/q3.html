<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Image Showcase</title>
  <link rel="stylesheet" href="q3.css">
</head>
<body>
  <main class="gallery">
    <h1>Image Showcase</h1>
    <section class="grid">
      <figure>
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800&q=80" alt="Delicious Pasta">
        <figcaption>Delicious Pasta</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800&q=80" alt="Fruit Bowl">
        <figcaption>Fresh Fruit Bowl</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1498579809087-ef1e558fd1da?auto=format&fit=crop&w=800&q=80" alt="Coffee and Book">
        <figcaption>Morning Coffee</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1510626176961-4b37d0e3e0c8?auto=format&fit=crop&w=800&q=80" alt="Tropical Smoothie">
        <figcaption>Tropical Smoothie</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800&q=80" alt="Salad Bowl">
        <figcaption>Healthy Salad</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=800&q=80" alt="Pizza">
        <figcaption>Cheesy Pizza</figcaption>
      </figure>
    </section>
  </main>
</body>
</html>
